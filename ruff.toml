# Ruff configuration
# See: https://docs.astral.sh/ruff/configuration/

line-length = 88
target-version = "py313"

# Formatting configuration
[format]
# Use Black-compatible style
quote-style = "double"
indent-style = "space"

# Lint configuration
[lint]
# Enable commonly used rules
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "C4",  # flake8-comprehensions
    "B",   # flake8-bugbear
    "A",   # flake8-builtins
    "Q",   # flake8-quotes
    "SIM", # flake8-simplify
    "PERF", # flake8-perflint
]

# Ignore specific rules
ignore = [
    "E501",  # line too long - handled by line-length
    "Q000",  # double quotes vs single quotes (use double for docstrings)
]

# Per-file ignores
[lint.per-file-ignores]
# Example: ignore certain rules in test files
"**/test_*.py" = ["S101"]  # ignore assert in tests