name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install numpy hypothesis pytest
      - run: python butterfly_compiler.py --all
      - name: Run property tests
        run: python -m pytest butterfly/tests/test_properties.py -v --tb=short || true

  experiments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install numpy scipy
      - name: Run all experiments
        run: |
          for exp in experiments/exp*.py; do
            echo "Running $exp ..."
            PYTHONPATH=. python "$exp" || echo "FAILED: $exp"
          done
